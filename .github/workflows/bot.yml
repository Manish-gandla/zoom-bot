name: Zoom Meeting Bot

on:
  workflow_dispatch:
    inputs:
      meeting_url:
        description: 'Zoom Meeting Join URL'
        required: true
        default: 'https://bytexl-in.zoom.us/w/87508297509?tk=...'

jobs:
  bot-rahul:
    name: Bot 1 - Rahul Sharma
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create bot.js and install dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          cat > bot.js << 'BOTEOF'
const { chromium } = require('playwright');
const fs = require('fs');
const path = require('path');

const MEETING_URL = process.env.MEETING_URL;
const BOT_NAME = process.env.BOT_NAME || 'Bot';
const SCREENSHOT_DIR = path.join(__dirname, 'screenshots');
const b64name = Buffer.from(BOT_NAME).toString('base64');

async function shot(page, label) {
  if (!fs.existsSync(SCREENSHOT_DIR)) fs.mkdirSync(SCREENSHOT_DIR, { recursive: true });
  await page.screenshot({ path: path.join(SCREENSHOT_DIR, `${BOT_NAME.replace(/\\s+/g,'_')}_${label}.png`), fullPage: true });
  console.log(`📸 ${label}`);
}

const wait = ms => new Promise(r => setTimeout(r, ms));

async function logPage(page, label) {
  const text = await page.evaluate(() => document.body.innerText);
  console.log(`\n=== ${label} ===`);
  console.log(text.substring(0,1200));
  console.log('================\n');
}

// Multi-strategy button clicker
const PATTERNS = [
  'join from browser', 'continue without microphone', 'continue without camera',
  'continue without', 'join', 'join audio', 'join with computer audio',
  'mute', 'stop video', 'turn off microphone', 'turn off camera',
  'leave', 'end'
];

async function clickFirstMatch(page) {
  for (const pattern of PATTERNS) {
    // Strategy 1: getByRole button
    const roleBtn = page.getByRole('button', { name: new RegExp(pattern, 'i') });
    const rc = await roleBtn.count();
    if (rc > 0) {
      const b = roleBtn.first();
      if (await b.isVisible()) { await b.click(); console.log(`✅ role-btn: "${pattern}"`); return pattern; }
    }
    // Strategy 2: getByText
    const te = page.getByText(new RegExp(pattern, 'i'));
    const tc = await te.count();
    if (tc > 0) {
      for (let i = 0; i < tc; i++) {
        const el = te.nth(i);
        if (await el.isVisible()) {
          await el.click().catch(async () => { try { await el.locator('..').click(); } catch(e){} });
          console.log(`✅ text: "${pattern}"`); return pattern;
        }
      }
    }
    // Strategy 3: brute DOM
    const clicked = await page.evaluate((pt) => {
      const lower = pt.toLowerCase();
      for (const sel of ['button','a','span[role="button"]','[class*="btn"]','[class*="join"]','[class*="button"]']) {
        for (const el of document.querySelectorAll(sel)) {
          const t = (el.textContent||'').toLowerCase().trim();
          if (t.includes(lower)) { const r=el.getBoundingClientRect(); if(r.width>0&&r.height>0){ el.click(); return true; } }
        }
      }
      // Everything
      for (const el of document.querySelectorAll('*')) {
        const t = (el.textContent||'').toLowerCase().trim();
        if (t.includes(lower)) {
          const r = el.getBoundingClientRect();
          if (r.width>0&&r.height>0) {
            if (el.tagName==='BUTTON'||el.tagName==='A'||el.getAttribute('role')==='button') { el.click(); return true; }
            const p = el.parentElement;
            if (p&&(p.tagName==='BUTTON'||p.tagName==='A'||p.getAttribute('role')==='button')) { p.click(); return true; }
          }
        }
      }
      return false;
    }, pattern);
    if (clicked) { console.log(`✅ dom: "${pattern}"`); return pattern; }
  }
  return null;
}

async function run() {
  console.log(`\n🚀 ${BOT_NAME}`);
  let url = MEETING_URL;
  const sep = MEETING_URL.includes('?') ? '&' : '?';
  url = `${MEETING_URL}${sep}prefer=1&un=${b64name}`;

  const browser = await chromium.launch({
    headless: true,
    args: [
      '--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage',
      '--disable-gpu','--window-size=1920,1080',
      '--use-fake-ui-for-media-stream','--use-fake-device-for-media-stream',
      '--disable-blink-features=AutomationControlled',
      '--no-first-run','--disable-extensions','--ignore-certificate-errors',
    ],
  });

  const ctx = await browser.newContext({
    viewport:{width:1920,height:1080},
    userAgent:'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/125.0.0.0 Safari/537.36',
    locale:'en-US', timezoneId:'Asia/Kolkata',
    permissions:['camera','microphone'], ignoreHTTPSErrors:true,
  });

  const page = await ctx.newPage();
  page.on('console', m => { if(m.type()==='error') console.log(`  [PAGE_ERR] ${m.text()}`); });

  try {
    console.log(`📱 Navigating...`);
    await page.goto(url, { waitUntil:'domcontentloaded', timeout:30000 });
    await wait(4000);
    await shot(page, '00_initial');
    await logPage(page, 'After load');

    let stuck = 0;
    for (let i = 0; i < 60; i++) {
      console.log(`\n--- Round ${i+1} ---`);
      if (i % 3 === 0) await shot(page, `r${String(i).padStart(2,'0')}`);

      const clicked = await clickFirstMatch(page);
      if (clicked) {
        console.log(`  ✅ ${clicked}, waiting...`);
        stuck = 0;
        await wait(4000);
        await logPage(page, `After ${clicked}`);

        // Check if joined
        const joined = await page.evaluate(() => {
          const t = document.body.innerText.toLowerCase();
          return t.includes('leave') || t.includes('end meeting') || t.includes('participants') || t.includes('chat') || t.includes('share screen') || t.includes('security');
        });
        if (joined) {
          console.log(`\n🎉 ${BOT_NAME} JOINED THE MEETING!`);
          await shot(page, 'joined');
          for (let m = 0; m < 45; m++) {
            await wait(60000);
            if (m % 5 === 0) { await shot(page, `stay_${m}m`); console.log(`  ⏱ ${m+1}m elapsed`); }
          }
          console.log('✅ Done');
          break;
        }
      } else {
        stuck++;
        console.log(`  ⏳ No match (${stuck})`);
        if (stuck >= 10) { console.log('❌ Stuck, stopping'); await shot(page, 'stuck'); break; }
        await wait(3000);
      }
    }
  } catch(e) {
    console.error(`❌ ${e.message}`);
    await shot(page,'error').catch(()=>{});
  } finally {
    await browser.close();
    console.log(`🏁 ${BOT_NAME} done`);
  }
}
run().catch(console.error);
BOTEOF
          ls -la bot.js

      - name: Run Rahul Bot
        env:
          MEETING_URL: ${{ github.event.inputs.meeting_url }}
          BOT_NAME: "Rahul Sharma"
        run: node bot.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-rahul
          path: screenshots/
          retention-days: 7

  bot-priya:
    name: Bot 2 - Priya Patel
