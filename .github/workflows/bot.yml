name: Zoom Bot Run

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      bot1_name:
        description: 'Bot 1 Name'
        required: true
        default: 'Rahul Sharma'
      bot2_name:
        description: 'Bot 2 Name'
        required: true
        default: 'Priya Patel'
      duration_minutes:
        description: 'Duration in minutes'
        required: true
        default: '60'

jobs:
  run-zoom-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing \
            ca-certificates \
            libgbm-dev \
            libnss3 \
            libnspr4 \
            libatk1.0-0t64 \
            libatk-bridge2.0-0t64 \
            libcups2t64 \
            libdrm2 \
            libdbus-1-3 \
            libexpat1 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            libsystemd0 \
            libx11-xcb1 \
            libxcb1 \
            libxshmfence1 \
            libfontconfig1 \
            libfreetype6

      - name: Install Playwright
        run: |
          pip install playwright

      - name: Install Chromium
        run: |
          python -m playwright install chromium

      - name: Verify installation
        run: |
          python -c "from playwright.sync_api import sync_playwright; print('Playwright installed OK')"

      - name: Run Zoom Bots
        run: |
          DURATION="${{ github.event.inputs.duration_minutes }}"
          if [ -z "$DURATION" ]; then
            DURATION=60
          fi
          DURATION_SECONDS=$(( DURATION * 60 ))
          echo "Duration: $DURATION minutes ($DURATION_SECONDS seconds)"
          python zoom_bot.py "" "${{ github.event.inputs.bot1_name }}" "${{ github.event.inputs.bot2_name }}" "$DURATION_SECONDS"

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: step*.png
          retention-days: 7
