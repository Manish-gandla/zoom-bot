name: Zoom Meeting Bot

on:
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create bot file and run
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');
          const BOT_NAME = 'Rahul Sharma';
          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage','--use-fake-ui-for-media-stream','--use-fake-device-for-media-stream']
            });
            const page = await browser.newPage();
            await page.goto('https://example.com', { waitUntil: 'domcontentloaded' });
            await page.screenshot({ path: 'test.png' });
            console.log('Browser works!');
            await browser.close();
          })().catch(e => { console.error(e); process.exit(1); });
          "
