name: Zoom Bot Run

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      bot1_name:
        description: 'Bot 1 Name'
        required: true
        default: 'Rahul Sharma'
      bot2_name:
        description: 'Bot 2 Name'
        required: true
        default: 'Priya Patel'
      duration_minutes:
        description: 'Duration in minutes'
        required: true
        default: '60'

jobs:
  run-zoom-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies for browsers
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing \
            ca-certificates \
            libgbm-dev \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libexpat1 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2 \
            libsystemd0 \
            libx11-xcb1 \
            libxcb1 \
            libxshmfence1
      
      - name: Install Playwright
        run: |
          pip install playwright
      
      - name: Install Chromium with retries (fixes exit code 100)
        run: |
          npx playwright install chromium 2>/dev/null || \
          python -m playwright install --force chromium 2>/dev/null || \
          (sudo apt-get install -y chromium-browser && echo "Using system chromium") || \
          (echo "Retrying playwright install..." && pip install --upgrade playwright && python -m playwright install chromium)
        shell: bash
      
      - name: Verify Chromium installation
        run: |
          python -c "from playwright.sync_api import sync_playwright; print('Playwright OK')"
          ls -la ~/.cache/ms-playwright/ 2>/dev/null && echo "Browser cache exists" || echo "No cache directory"
      
      - name: Run Zoom Bots
        run: |
          DURATION_SECONDS=$(( ${{ github.event.inputs.duration_minutes }} * 60 ))
          python zoom_bot.py \
            "" \
            "${{ github.event.inputs.bot1_name }}" \
            "${{ github.event.inputs.bot2_name }}" \
            "$DURATION_SECONDS"
      
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          retention-days: 1
