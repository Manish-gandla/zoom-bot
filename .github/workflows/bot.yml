name: Zoom Bot Run

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * 1-6'
    # 10:00 AM IST = 4:30 AM UTC
    - cron: '30 4 * * 1-6'
    # 11:00 AM IST = 5:30 AM UTC
    - cron: '30 5 * * 1-6'
    # 12:00 PM IST = 6:30 AM UTC
    - cron: '30 6 * * 1-6'
    # 1:00 PM IST = 7:30 AM UTC
    - cron: '30 7 * * 1-6'
  
  workflow_dispatch:
    inputs:
      bot1_name:
        description: 'Bot 1 Name'
        required: true
        default: 'Rahul Sharma'
      bot2_name:
        description: 'Bot 2 Name'
        required: true
        default: 'Priya Patel'
      duration_minutes:
        description: 'Duration in minutes'
        required: true
        default: '60'

jobs:
  run-zoom-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libexpat1 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2 libsystemd0
      
      - name: Install Python dependencies
        run: pip install playwright
      
      - name: Install Chromium browser
        run: python -m playwright install chromium
      
      - name: Run Zoom Bots
        run: |
          DURATION_SECONDS=$(( ${{ github.event.inputs.duration_minutes }} * 60 ))
          python zoom_bot.py \
            "" \
            "${{ github.event.inputs.bot1_name }}" \
            "${{ github.event.inputs.bot2_name }}" \
            "$DURATION_SECONDS"
      
      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          retention-days: 1
