name: Zoom Meeting Bot

on:
  workflow_dispatch:
    inputs:
      meeting_url:
        description: 'Zoom Meeting Join URL'
        required: true
        default: 'https://bytexl-in.zoom.us/w/87508297509?tk=...'

jobs:
  bot-rahul:
    name: "Bot 1 - Rahul Sharma"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup and run
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
          node << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');
          
          const MEETING_URL = process.env.MEETING_URL;
          const BOT_NAME = process.env.BOT_NAME;
          const b64name = Buffer.from(BOT_NAME).toString('base64');
          const wait = ms => new Promise(r => setTimeout(r, ms));
          
          async function shot(page, label) {
            const d = 'screenshots';
            if (!fs.existsSync(d)) fs.mkdirSync(d);
            await page.screenshot({ path: path.join(d, `${BOT_NAME.replace(/\s+/g,'_')}_${label}.png`), fullPage: true });
          }
          
          async function logState(page, label) {
            console.log(`\n=== ${label} ===`);
            console.log(await page.evaluate(() => document.body.innerText.substring(0,2000)));
            console.log('URL:', page.url());
            // Check for iframes
            const iframes = await page.evaluate(() => {
              return Array.from(document.querySelectorAll('iframe')).map(f => f.src || f.id || f.name);
            });
            if (iframes.length > 0) console.log('IFRAMES:', iframes);
            const buttons = await page.evaluate(() => {
              return Array.from(document.querySelectorAll('button')).map(b => ({ text: b.textContent.trim().substring(0,50), visible: b.offsetWidth > 0 && b.offsetHeight > 0 }));
            });
            console.log('BUTTONS found:', buttons.filter(b => b.visible).length);
            buttons.filter(b => b.visible).forEach(b => console.log('  Button:', b.text));
            console.log('================\n');
          }
          
          async function clickSmart(page, texts) {
            for (const text of texts) {
              // Try button role
              try {
                const btn = page.getByRole('button', { name: new RegExp(text, 'i') });
                if ((await btn.count()) > 0) {
                  const b = btn.first();
                  if (await b.isVisible()) { await b.click(); console.log('CLICK role: '+text); return text; }
                }
              } catch(e) {}
              
              // Try text match
              try {
                const loc = page.getByText(new RegExp(text, 'i'));
                for (let i = 0; i < (await loc.count()); i++) {
                  if (await loc.nth(i).isVisible()) {
                    await loc.nth(i).click().catch(() => loc.nth(i).locator('..').click().catch(()=>{}));
                    console.log('CLICK text: '+text); return text;
                  }
                }
              } catch(e) {}
              
              // Try all iframes too
              for (const frame of page.frames()) {
                try {
                  const fbtn = frame.getByRole('button', { name: new RegExp(text, 'i') });
                  if ((await fbtn.count()) > 0 && (await fbtn.first().isVisible())) {
                    await fbtn.first().click();
                    console.log('CLICK iframe-role: '+text); return text;
                  }
                } catch(e) {}
                try {
                  const ftxt = frame.getByText(new RegExp(text, 'i'));
                  for (let i = 0; i < (await ftxt.count()); i++) {
                    if (await ftxt.nth(i).isVisible()) {
                      await ftxt.nth(i).click().catch(()=>{});
                      console.log('CLICK iframe-text: '+text); return text;
                    }
                  }
                } catch(e) {}
              }
              
              // DOM brute force (ALL frames)
              const dom = await page.evaluate((s) => {
                const q = s.toLowerCase();
                const search = (doc) => {
                  for (const el of doc.querySelectorAll('button,a,span,[role="button"],[class*="btn"],[class*="button"],[class*="join"],[class*="action"]')) {
                    if ((el.textContent||'').toLowerCase().includes(q) && el.offsetWidth > 0 && el.offsetHeight > 0) {
                      el.click(); return true;
                    }
                  }
                  return false;
                };
                if (search(document)) return true;
                for (const iframe of document.querySelectorAll('iframe')) {
                  try {
                    if (iframe.contentDocument && search(iframe.contentDocument)) return true;
                  } catch(e) {}
                }
                return false;
              }, text);
              if (dom) { console.log('CLICK dom: '+text); return text; }
            }
            return null;
          }
          
          async function run() {
            console.log(`\n🚀 ${BOT_NAME}`);
            const url = MEETING_URL + (MEETING_URL.includes('?')?'&':'?') + 'prefer=1&un=' + b64name;
            
            const browser = await chromium.launch({
              headless: true,
              args: [
                '--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage',
                '--window-size=1920,1080',
                '--use-fake-ui-for-media-stream','--use-fake-device-for-media-stream',
                '--disable-blink-features=AutomationControlled',
                '--ignore-certificate-errors',
              ],
            });
            
            const ctx = await browser.newContext({
              viewport: {width:1920,height:1080},
              userAgent: 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/125.0.0.0 Safari/537.36',
              locale: 'en-US',
              permissions: ['camera','microphone'],
            });
            
            const page = await ctx.newPage();
            page.on('console', m => { if(m.type()==='error'||m.type()==='warning') console.log(`[PAGE] ${m.text()}`); });
            
            try {
              console.log('Navigating to:', url.substring(0,100)+'...');
              await page.goto(url, { waitUntil: 'load', timeout: 30000 });
              await wait(6000);
              await shot(page, '01_initial');
              await logState(page, 'INITIAL LOAD');
              
              // Phase 1: Click "Join from browser" if present
              console.log('\n--- PHASE 1: Join from browser ---');
              const phase1 = ['join from browser', 'join from your browser', 'launch meeting', 'start from your browser'];
              let clicked = await clickSmart(page, phase1);
              if (clicked) {
                await wait(8000); // Wait for page transition
                await shot(page, '02_after_join_browser');
                await logState(page, 'AFTER JOIN BROWSER');
              }
              
              // Phase 2: Handle the meeting lobby - focus on ALL frames
              console.log('\n--- PHASE 2: Meeting lobby ---');
              const phase2 = [
                'continue without microphone', 'continue without camera', 
                'continue without', 'turn off microphone', 'turn off camera',
                'stop video', 'mute', 'join audio', 'join with computer audio',
                'join'
              ];
              
              let stuck = 0;
              for (let i = 0; i < 30; i++) {
                console.log(`\n--- Round ${i+1} ---`);
                await logState(page, `Round ${i+1}`);
                
                // Check if already in meeting
                const inMeeting = await page.evaluate(() => {
                  const t = document.body.innerText.toLowerCase();
                  return t.includes('leave meeting') || t.includes('end meeting') || t.includes('participants') || t.includes('chat') || t.includes('share screen') || t.includes('security') || t.includes('record');
                });
                if (inMeeting) {
                  console.log('\n🎉 JOINED THE MEETING!');
                  await shot(page, '03_joined');
                  await wait(120000);
                  break;
                }
                
                clicked = await clickSmart(page, phase2);
                if (clicked) {
                  stuck = 0;
                  await wait(5000);
                  await shot(page, `round_${i}`);
                } else {
                  stuck++;
                  console.log('No match, stuck:', stuck);
                  if (stuck >= 5) { await shot(page, '04_stuck_final'); break; }
                  await wait(3000);
                }
              }
            } catch(e) {
              console.error('Error:', e.message, e.stack);
              await shot(page,'error').catch(()=>{});
            } finally {
              await browser.close();
              console.log('🏁 Done');
            }
          }
          run().catch(e => { console.error(e); process.exit(1); });
          EOF
        env:
          MEETING_URL: ${{ github.event.inputs.meeting_url }}
          BOT_NAME: "Rahul Sharma"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-rahul
          path: screenshots/
          retention-days: 7

