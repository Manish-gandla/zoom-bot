name: Zoom Meeting Bot

on:
  workflow_dispatch:
    inputs:
      meeting_url:
        description: 'Zoom Meeting Join URL'
        required: true
        default: 'https://bytexl-in.zoom.us/w/87508297509?tk=...'

jobs:
  bot-rahul:
    name: Bot 1 - Rahul Sharma
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
      - name: Run Rahul Bot
        env:
          MEETING_URL: ${{ github.event.inputs.meeting_url }}
          BOT_NAME: "Rahul Sharma"
        run: node bot.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-rahul
          path: screenshots/
          retention-days: 7

  bot-priya:
    name: Bot 2 - Priya Patel
    needs: bot-rahul
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium
      - name: Run Priya Bot
        env:
          MEETING_URL: ${{ github.event.inputs.meeting_url }}
          BOT_NAME: "Priya Patel"
        run: node bot.js
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-priya
          path: screenshots/
          retention-days: 7
