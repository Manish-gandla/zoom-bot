name: Zoom Bot Run

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: 'Duration in minutes'
        required: true
        default: '60'

jobs:
  run-zoom-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing \
            ca-certificates \
            libnss3 libnspr4 libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libdbus-1-3 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 \
            libsystemd0 libx11-xcb1 libxcb1 libxshmfence1

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Verify
        run: python -c "from playwright.sync_api import sync_playwright; print('Playwright OK')"

      - name: Run Bot
        run: |
          DURATION="${{ github.event.inputs.duration_minutes }}"
          if [ -z "$DURATION" ]; then DURATION=60; fi
          SECONDS=$(( DURATION * 60 ))
          python zoom_bot.py "" "$SECONDS"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          retention-days: 7
